# SOPS configuration for encrypted secrets
#
# To add a new host:
#   1. Get the host's SSH public key: ssh-keyscan <hostname> 2>/dev/null | grep ed25519
#   2. Convert to age: ssh-to-age -i /path/to/ssh_host_ed25519_key.pub
#   3. Add the age key to this file under 'keys'
#   4. Create secrets/<hostname>.yaml
#   5. Run: sops secrets/<hostname>.yaml
#
# To edit secrets: sops secrets/<hostname>.yaml

keys:
  # Admin keys (can decrypt all secrets)
  # Add your personal age key here:
  # - &admin_joost age1...

  # Host keys (derived from SSH host keys using ssh-to-age)
  # Run: ssh-to-age -i /etc/ssh/ssh_host_ed25519_key.pub
  - &joostclaw age17n047nq8vclhr2gja7fe8z9uv8pug49r6k6c27cxd92jgnmups2qcdte99
  - &github-runner-02 age1payjujelqgvgpkpapl0cske00waj5vn6xtrz2rr9ag8gt8rphyls9d2dz4
  - &github-runner-03 age1g8sf3amu7jy4qhmdyzygw7uuhq9rlejq8kt0mst24t935fh2054sqwfty4
  # github-runner-04: placeholder = loom's age key until the EX63 (178.63.233.19)
  # is provisioned. After provisioning, derive the host's real age key
  # (`ssh-keyscan 178.63.233.19 | grep ed25519 | ssh-to-age`), replace the value
  # below, then `sops updatekeys secrets/github-runner-04.yaml`.
  - &github-runner-04 age1p26cwwyu2v4jexue6z7krrua9skqv0p3aj4ad3su4m7varky3dwqk0zphj
  - &loom age1p26cwwyu2v4jexue6z7krrua9skqv0p3aj4ad3su4m7varky3dwqk0zphj
  # hermes-fu: placeholder. Replace with the real age recipient (derived from
  # /etc/ssh/ssh_host_ed25519_key.pub via `ssh-to-age`) after provisioning the VM.
  # Until then, secrets/hermes-fu.yaml cannot be encrypted (creation rule below
  # references this anchor); hosts/hermes-fu.nix has the sops block commented out.
  - &hermes-fu age1__TBD__derived_after_provisioning__

creation_rules:
  # joostclaw secrets
  - path_regex: secrets/joostclaw\.yaml$
    key_groups:
      - age:
          - *joostclaw

  # github-runner-02 secrets (GitHub runner token)
  - path_regex: secrets/github-runner-02\.yaml$
    key_groups:
      - age:
          - *github-runner-02
          # - *admin_joost  # Uncomment after adding admin key

  # github-runner-03 secrets (GitHub runner token) — EX63 dedicated server.
  - path_regex: secrets/github-runner-03\.yaml$
    key_groups:
      - age:
          - *github-runner-03

  # github-runner-04 secrets (GitHub runner token) — EX63 dedicated server.
  # anchor is loom's placeholder key until the host is provisioned + re-keyed.
  - path_regex: secrets/github-runner-04\.yaml$
    key_groups:
      - age:
          - *github-runner-04

  # loom secrets (hermes-agent env)
  - path_regex: secrets/loom\.yaml$
    key_groups:
      - age:
          - *loom

  # hermes-fu secrets (FashionUnited company-wide hermes-agent env)
  # NOTE: anchor &hermes-fu is a placeholder until the VM is provisioned.
  # `sops secrets/hermes-fu.yaml` will fail until the anchor is replaced with
  # the real age recipient derived from the new host's SSH host key.
  - path_regex: secrets/hermes-fu\.yaml$
    key_groups:
      - age:
          - *hermes-fu
